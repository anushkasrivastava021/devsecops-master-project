apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: monitor-secret
  namespace: default
spec:
  encryptedData:
    # This represents an AES-256 encrypted string generated by the kubeseal CLI
    api-token: AgBy3i4OJSWK+PiPt5Phb...[mock-encryption-block-for-architecture-demo]...xyz123
  template:
    metadata:
      name: monitor-secret
      labels:
        app: server-monitor
    # When the controller decrypts this, it transforms it into a standard Opaque secret
    type: Opaque