name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-and-build:
    name: Build & Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------------------------------------
      # 1. INFRASTRUCTURE SECURITY SCAN (tfsec)
      # ---------------------------------------------
      - name: Run tfsec via Docker (Bypass API Limits)
        run: docker run --rm -v ${{ github.workspace }}/terraform:/src aquasec/tfsec /src --soft-fail

      # ---------------------------------------------
      # 2. BUILD THE SECURE CONTAINER
      # ---------------------------------------------
      - name: Build Docker Image
        run: docker build -t server-monitor:latest ./app
        
      # ---------------------------------------------
      # 3. CONTAINER VULNERABILITY SCAN (Trivy)
      # ---------------------------------------------
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'server-monitor:latest'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'